<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Title</title>
<style>
  :root {
    --hue: 220;
    --bg: hsl(var(--hue), 15%, 97%);
    --surface: hsl(0, 0%, 100%);
    --text: hsl(var(--hue), 20%, 15%);
    --text-secondary: hsl(var(--hue), 10%, 45%);
    --accent: hsl(var(--hue), 80%, 55%);
    --accent-light: hsl(var(--hue), 80%, 95%);
    --radius: 12px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --font-mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .deck {
    width: 100vw;
    height: 100vh;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 4rem 6rem;
    opacity: 0;
    transform: translateX(100%);
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
  }

  .slide.active {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }

  .slide.prev {
    opacity: 0;
    transform: translateX(-100%);
  }

  /* Slide types */
  .slide--title {
    background: linear-gradient(135deg, hsl(var(--hue), 80%, 50%), hsl(calc(var(--hue) + 30), 70%, 45%));
    color: white;
    text-align: center;
  }

  .slide--title h1 {
    font-size: 4rem;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 1rem;
  }

  .slide--title p {
    font-size: 1.5rem;
    opacity: 0.85;
  }

  .slide--content {
    background: var(--surface);
    align-items: flex-start;
  }

  .slide--content h2 {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 2rem;
    color: var(--accent);
  }

  .slide--content ul {
    list-style: none;
    font-size: 1.4rem;
    line-height: 2;
  }

  .slide--content ul li::before {
    content: '→';
    color: var(--accent);
    font-weight: bold;
    margin-right: 1rem;
  }

  .slide--section {
    background: var(--accent);
    color: white;
    text-align: center;
  }

  .slide--section h2 {
    font-size: 3rem;
    font-weight: 800;
  }

  /* Navigation */
  .nav {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 1.5rem;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 0.5rem 1.5rem;
    border-radius: 2rem;
    font-size: 0.9rem;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .nav button {
    background: none;
    border: none;
    color: white;
    font-size: 1.2rem;
    cursor: pointer;
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .nav button:hover { background: rgba(255,255,255,0.2); }

  .progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: var(--accent);
    transition: width 0.5s ease;
    z-index: 100;
  }
</style>
</head>
<body>
  <div class="progress" id="progress"></div>

  <div class="deck" id="deck">
    <!-- TITLE SLIDE -->
    <section class="slide slide--title active" data-notes="Welcome everyone">
      <h1>Your Presentation Title</h1>
      <p>Subtitle or tagline goes here</p>
    </section>

    <!-- CONTENT SLIDE -->
    <section class="slide slide--content" data-notes="">
      <h2>Key Points</h2>
      <ul>
        <li>First important insight</li>
        <li>Second important insight</li>
        <li>Third important insight</li>
      </ul>
    </section>

    <!-- SECTION DIVIDER -->
    <section class="slide slide--section" data-notes="">
      <h2>Next Section</h2>
    </section>

    <!-- CLOSING SLIDE -->
    <section class="slide slide--title" data-notes="Thank you">
      <h1>Thank You</h1>
      <p>Questions?</p>
    </section>
  </div>

  <div class="nav">
    <button onclick="navigate(-1)">◀</button>
    <span id="counter">1 / 4</span>
    <button onclick="navigate(1)">▶</button>
  </div>

  <script>
    const slides = document.querySelectorAll('.slide');
    const counter = document.getElementById('counter');
    const progress = document.getElementById('progress');
    let current = 0;

    function showSlide(index) {
      slides.forEach((s, i) => {
        s.classList.remove('active', 'prev');
        if (i === index) s.classList.add('active');
        else if (i < index) s.classList.add('prev');
      });
      counter.textContent = `${index + 1} / ${slides.length}`;
      progress.style.width = `${((index + 1) / slides.length) * 100}%`;
      location.hash = `slide-${index + 1}`;
    }

    function navigate(dir) {
      current = Math.max(0, Math.min(slides.length - 1, current + dir));
      showSlide(current);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); navigate(1); }
      if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); }
    });

    // Click navigation: left third = prev, right two-thirds = next
    document.getElementById('deck').addEventListener('click', (e) => {
      if (e.target.closest('.nav')) return;
      const x = e.clientX / window.innerWidth;
      navigate(x < 0.33 ? -1 : 1);
    });

    // Hash navigation
    if (location.hash) {
      const n = parseInt(location.hash.replace('#slide-', ''));
      if (n >= 1 && n <= slides.length) { current = n - 1; showSlide(current); }
    }
  </script>
</body>
</html>
