<!DOCTYPE html>
<html lang="en" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root, .theme-dark {
      --bg: #030712; --surface: #111827; --surface-hover: #1f2937;
      --border: rgba(255,255,255,0.08);
      --text: #f9fafb; --text-secondary: #9ca3af;
      --accent: #3b82f6; --accent-secondary: #8b5cf6;
      --positive: #10b981; --negative: #f43f5e; --warning: #f59e0b;
    }
    .theme-light {
      --bg: #f8fafc; --surface: #ffffff; --surface-hover: #f1f5f9;
      --border: rgba(0,0,0,0.08);
      --text: #0f172a; --text-secondary: #64748b;
      --accent: #2563eb; --accent-secondary: #7c3aed;
      --positive: #059669; --negative: #e11d48; --warning: #d97706;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }
    h1,h2,h3,h4 { color: var(--text); }
    .text-secondary { color: var(--text-secondary); }

    .skip-link {
      position: absolute; top: -100px; left: 16px; padding: 8px 16px;
      background: var(--accent); color: #fff; border-radius: 8px; z-index: 99999;
      text-decoration: none; font-weight: 600;
    }
    .skip-link:focus { top: 16px; }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.2); }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .animate { animation: fadeInUp 0.6s ease-out both; }
    .animate.delay-1 { animation-delay: 0.1s; }
    .animate.delay-2 { animation-delay: 0.2s; }
    .animate.delay-3 { animation-delay: 0.3s; }
    .animate.delay-4 { animation-delay: 0.4s; }
    .animate.delay-5 { animation-delay: 0.5s; }
    .animate.delay-6 { animation-delay: 0.6s; }

    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .reveal { opacity: 1 !important; transform: none !important; }
    }

    @media print {
      body { background: white !important; color: black !important; }
      .viz-menu { display: none !important; }
      .reveal { opacity: 1 !important; transform: none !important; }
      .card { break-inside: avoid; border: 1px solid #ddd; box-shadow: none; }
      * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
    }

    .viz-menu { position: fixed; top: 16px; right: 16px; z-index: 9999; }
    .viz-menu-toggle {
      width: 44px; height: 44px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      backdrop-filter: blur(12px); transition: all 0.2s;
    }
    .viz-menu-toggle:hover { background: var(--surface-hover); }
    .viz-menu-dropdown {
      position: absolute; top: 52px; right: 0; min-width: 200px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px;
      opacity: 0; visibility: hidden; transform: translateY(-8px);
      transition: all 0.2s; backdrop-filter: blur(16px);
    }
    .viz-menu-dropdown.open { opacity: 1; visibility: visible; transform: translateY(0); }
    .viz-menu-dropdown button {
      width: 100%; padding: 10px 14px; border: none; border-radius: 8px;
      background: transparent; color: var(--text); font-size: 14px;
      font-family: inherit; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 10px; transition: background 0.15s;
    }
    .viz-menu-dropdown button:hover { background: var(--surface-hover); }
    .viz-menu-dropdown svg { width: 18px; height: 18px; flex-shrink: 0; }

    /* Dashboard */
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
    .dash-header h1 { font-size: 2rem; font-weight: 800; }
    .live-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--positive);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.4); } }

    .kpi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
    .kpi-card { text-align: center; }
    .kpi-label { font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
    .kpi-value { font-size: 2.25rem; font-weight: 800; }
    .kpi-change { font-size: 0.8rem; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .kpi-change svg { width: 14px; height: 14px; }
    .kpi-up { color: var(--positive); }
    .kpi-down { color: var(--negative); }

    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .chart-card { padding: 24px; }
    .chart-card h3 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 300px; }

    @media (max-width: 768px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
      .chart-wrap { height: 250px; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  <div class="viz-menu">
    <button class="viz-menu-toggle" onclick="toggleMenu()" aria-label="Open menu">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="viz-menu-dropdown" id="vizMenuDropdown" role="menu">
      <button onclick="cycleTheme()" role="menuitem">
        <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
        <span id="themeLabel">Dark</span>
      </button>
      <button onclick="downloadImage()" role="menuitem">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Download PNG</span>
      </button>
      <button onclick="window.print()" role="menuitem">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        <span>Print / PDF</span>
      </button>
    </div>
  </div>

  <main id="main-content">
    <div class="container">
      <header class="dash-header animate">
        <h1>SaaS Metrics</h1>
        <div class="live-badge" aria-label="Dashboard is showing live data">
          <div class="live-dot" aria-hidden="true"></div>
          <span>Live</span>
        </div>
      </header>

      <section class="kpi-grid" aria-label="Key performance indicators">
        <article class="card kpi-card animate delay-1" aria-label="Monthly Recurring Revenue: $128K, up 12% vs last month">
          <div class="kpi-label">MRR</div>
          <div class="kpi-value" data-count="128" data-prefix="$" data-suffix="K">$128K</div>
          <div class="kpi-change kpi-up">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
            12% vs last month
          </div>
        </article>
        <article class="card kpi-card animate delay-2" aria-label="Annual Recurring Revenue: $1,540K, up 34% year over year">
          <div class="kpi-label">ARR</div>
          <div class="kpi-value" data-count="1540" data-prefix="$" data-suffix="K">$1,540K</div>
          <div class="kpi-change kpi-up">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
            34% YoY
          </div>
        </article>
        <article class="card kpi-card animate delay-3" aria-label="Active Users: 14,280, up 8% vs last month">
          <div class="kpi-label">Active Users</div>
          <div class="kpi-value" data-count="14280">14,280</div>
          <div class="kpi-change kpi-up">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
            8% vs last month
          </div>
        </article>
        <article class="card kpi-card animate delay-4" aria-label="Churn Rate: 3.2%, down 0.5% vs last month">
          <div class="kpi-label">Churn Rate</div>
          <div class="kpi-value" data-count="3" data-suffix=".2%">3.2%</div>
          <div class="kpi-change kpi-up">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            0.5% vs last month
          </div>
        </article>
        <article class="card kpi-card animate delay-5" aria-label="Lifetime Value: $2,840, up 6% vs last quarter">
          <div class="kpi-label">LTV</div>
          <div class="kpi-value" data-count="2840" data-prefix="$">$2,840</div>
          <div class="kpi-change kpi-up">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
            6% vs last quarter
          </div>
        </article>
        <article class="card kpi-card animate delay-6" aria-label="Customer Acquisition Cost: $186, down 11% vs last quarter">
          <div class="kpi-label">CAC</div>
          <div class="kpi-value" data-count="186" data-prefix="$">$186</div>
          <div class="kpi-change kpi-up">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            11% vs last quarter
          </div>
        </article>
      </section>

      <section class="charts-grid" data-reveal aria-label="Charts">
        <article class="card chart-card">
          <h3>Monthly Revenue</h3>
          <div class="chart-wrap" role="img" aria-label="Line chart showing revenue growing from $72K to $128K over 12 months"><canvas id="revenueChart"></canvas></div>
        </article>
        <article class="card chart-card">
          <h3>Churn Breakdown</h3>
          <div class="chart-wrap" role="img" aria-label="Doughnut chart: Voluntary 1.4%, Involuntary 1.0%, Downgrade 0.8%"><canvas id="churnChart"></canvas></div>
        </article>
        <article class="card chart-card">
          <h3>User Growth</h3>
          <div class="chart-wrap" role="img" aria-label="Bar chart showing new users growing from 820 to 2,100 per month"><canvas id="growthChart"></canvas></div>
        </article>
        <article class="card chart-card">
          <h3>Revenue by Plan</h3>
          <div class="chart-wrap" role="img" aria-label="Doughnut chart: Enterprise 52%, Pro 28%, Starter 14%, Free 6%"><canvas id="planChart"></canvas></div>
        </article>
      </section>
    </div>
  </main>

  <script>
    function toggleMenu() { document.getElementById('vizMenuDropdown').classList.toggle('open'); }
    document.addEventListener('click', function(e) { if (!e.target.closest('.viz-menu')) document.getElementById('vizMenuDropdown').classList.remove('open'); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') document.getElementById('vizMenuDropdown').classList.remove('open'); });

    var currentTheme = localStorage.getItem('viz-theme') || 'dark';
    var moonPath = '<path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>';
    var sunPath = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    function applyTheme(t) {
      document.documentElement.className = 'theme-' + t;
      document.getElementById('themeIcon').innerHTML = t === 'dark' ? moonPath : sunPath;
      document.getElementById('themeLabel').textContent = t === 'dark' ? 'Dark' : 'Light';
      localStorage.setItem('viz-theme', t); currentTheme = t;
      if (typeof onThemeChange === 'function') onThemeChange();
    }
    function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    applyTheme(currentTheme);

    // Scroll Reveal
    document.querySelectorAll('[data-reveal]').forEach(function(el) { el.classList.add('reveal'); });
    var revealObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); revealObserver.unobserve(e.target); } });
    }, { threshold: 0.15 });
    document.querySelectorAll('.reveal').forEach(function(el) { revealObserver.observe(el); });
    setTimeout(function() { document.querySelectorAll('.reveal').forEach(function(el) { el.classList.add('visible'); }); }, 500);

    // Number Counter
    function animateCounters() {
      document.querySelectorAll('[data-count]').forEach(function(el) {
        if (el.dataset.counted) return; el.dataset.counted = '1';
        var target = parseFloat(el.dataset.count), prefix = el.dataset.prefix || '', suffix = el.dataset.suffix || '';
        var start = performance.now(), duration = 1200;
        (function tick(now) {
          var p = Math.min((now - start) / duration, 1), eased = 1 - Math.pow(1 - p, 3);
          el.textContent = prefix + Math.round(target * eased).toLocaleString() + suffix;
          if (p < 1) requestAnimationFrame(tick);
        })(start);
      });
    }
    var counterEl = document.querySelector('[data-count]');
    if (counterEl) {
      var cObs = new IntersectionObserver(function(entries) {
        entries.forEach(function(e) { if (e.isIntersecting) { animateCounters(); cObs.disconnect(); } });
      }, { threshold: 0.3 });
      cObs.observe(counterEl);
    }

    async function downloadImage() {
      var menu = document.querySelector('.viz-menu'); menu.style.display = 'none';
      try {
        var url = await htmlToImage.toPng(document.body, { quality: 1, pixelRatio: 2, filter: function(n) { return !n.classList || !n.classList.contains('viz-menu'); } });
        var a = document.createElement('a'); a.href = url;
        a.download = document.title.replace(/\s+/g, '-').toLowerCase() + '.png'; a.click();
      } catch(e) { console.error('Download failed:', e); }
      menu.style.display = '';
    }

    // Charts
    var revenueChart = null, churnChart = null, growthChart = null, planChart = null;
    function getChartColors() {
      var s = getComputedStyle(document.documentElement);
      return {
        textSecondary: s.getPropertyValue('--text-secondary').trim(),
        border: s.getPropertyValue('--border').trim(),
        accent: s.getPropertyValue('--accent').trim(),
        accentSecondary: s.getPropertyValue('--accent-secondary').trim(),
        positive: s.getPropertyValue('--positive').trim(),
        negative: s.getPropertyValue('--negative').trim(),
        warning: s.getPropertyValue('--warning').trim()
      };
    }
    function buildCharts() {
      var c = getChartColors(); Chart.defaults.color = c.textSecondary;
      var months = ['Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun'];

      if (revenueChart) revenueChart.destroy();
      revenueChart = new Chart(document.getElementById('revenueChart'), {
        type: 'line', data: { labels: months, datasets: [{ label: 'Revenue ($K)', data: [72,78,84,89,95,98,104,108,112,118,124,128], borderColor: c.accent, backgroundColor: c.accent+'22', fill: true, tension: 0.4, pointRadius: 3 }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: c.accent+'ee', cornerRadius: 8, callbacks: { label: function(ctx) { return '$'+ctx.parsed.y+'K'; } } } }, scales: { x: { grid: { color: c.border } }, y: { grid: { color: c.border }, ticks: { callback: function(v) { return '$'+v+'K'; } } } } }
      });

      if (churnChart) churnChart.destroy();
      churnChart = new Chart(document.getElementById('churnChart'), {
        type: 'doughnut', data: { labels: ['Voluntary','Involuntary','Downgrade'], datasets: [{ data: [1.4,1.0,0.8], backgroundColor: [c.negative, c.warning, c.accentSecondary], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { position: 'bottom' }, tooltip: { cornerRadius: 8, callbacks: { label: function(ctx) { return ctx.label+': '+ctx.parsed+'%'; } } } }, cutout: '65%' }
      });

      if (growthChart) growthChart.destroy();
      growthChart = new Chart(document.getElementById('growthChart'), {
        type: 'bar', data: { labels: months, datasets: [{ label: 'New Users', data: [820,940,1100,1280,1350,1420,1500,1620,1780,1890,1950,2100], backgroundColor: c.positive, borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { display: false }, tooltip: { cornerRadius: 8, callbacks: { label: function(ctx) { return ctx.parsed.y.toLocaleString()+' new users'; } } } }, scales: { x: { grid: { display: false } }, y: { grid: { color: c.border } } } }
      });

      if (planChart) planChart.destroy();
      planChart = new Chart(document.getElementById('planChart'), {
        type: 'doughnut', data: { labels: ['Enterprise','Pro','Starter','Free'], datasets: [{ data: [52,28,14,6], backgroundColor: [c.accent, c.accentSecondary, c.positive, c.warning], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, animation: false, plugins: { legend: { position: 'bottom' }, tooltip: { cornerRadius: 8, callbacks: { label: function(ctx) { return ctx.label+': '+ctx.parsed+'%'; } } } }, cutout: '65%' }
      });
    }
    function onThemeChange() { buildCharts(); }
    buildCharts();
  </script>
</body>
</html>
